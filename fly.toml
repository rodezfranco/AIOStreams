# fly.toml app configuration file generated for aiostreams on 2025-09-22T22:42:20Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aiostreams'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  NODE_ENV = 'production'

  # Base configuration
  BASE_URL = 'https://aiostreams.fly.dev'
  INTERNAL_URL = 'http://localhost:8080'

  # Database
  DATABASE_URI = 'sqlite://./data/db.sqlite'

  # Security
  SECRET_KEY = '1213d70f99bb78cc8fb33d4e4d9e9c53e1792a31ec07ecdb6b486465f0f879d7'

  # API Keys (configure these in Fly.io secrets)
  # TMDB_ACCESS_TOKEN = ''
  # TRAKT_CLIENT_ID = ''
  # REDIS_URI = ''

  # Performance settings
  LOG_LEVEL = 'info'
  LOG_FORMAT = 'json'

  # Rate limiting
  DISABLE_RATE_LIMITS = 'false'

  # Proxy settings (optional)
  # ADDON_PROXY = 'https://your-proxy-url.com'

  # Debrid services (configure API keys in Fly.io secrets)
  # DEFAULT_REALDEBRID_API_KEY = ''
  # DEFAULT_ALLDEBRID_API_KEY = ''
  # DEFAULT_TORBOX_API_KEY = ''

  # Cache settings
  DEFAULT_MAX_CACHE_SIZE = '100000'
  STREAM_CACHE_TTL = '300'
  CATALOG_CACHE_TTL = '300'
  META_CACHE_TTL = '300'

  # Timeouts
  DEFAULT_TIMEOUT = '10000'
  CATALOG_TIMEOUT = '30000'
  META_TIMEOUT = '30000'

  # Feature flags
  ENABLE_SEARCH_API = 'true'
  EXPOSE_USER_COUNT = 'false'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/v1/status"
  port = 8080
  type = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  source = "data"
  destination = "/app/data"

# Static file serving
[[statics]]
  guest_path = "/app/packages/server/dist/static"
  url_prefix = "/static/"

# Environment variables that should be set as secrets in Fly.io
# Use: fly secrets set SECRET_KEY=your-secret-key-here
# Use: fly secrets set TMDB_ACCESS_TOKEN=your-tmdb-token
# Use: fly secrets set DEFAULT_TORBOX_API_KEY=your-torbox-key